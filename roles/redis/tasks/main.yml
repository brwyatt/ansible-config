---
- name: Install Redis
  ansible.builtin.package:
    name: redis-server
    state: present

- name: Configure Redis
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: '0640'
  notify: Restart Redis

- name: Ensure Redis is started and enabled
  ansible.builtin.service:
    name: redis-server
    state: started
    enabled: true
