---
- name: Create Shotover group
  ansible.builtin.group:
    name: "{{ shotover_group }}"
    state: present
    system: true
- name: Create Shotover user
  ansible.builtin.user:
    name: "{{ shotover_user }}"
    group: "{{ shotover_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false
- name: Create Shotover installation directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ shotover_install_root }}"
    - "{{ shotover_version_dir }}"
- name: Download and extract Shotover
  ansible.builtin.unarchive:
    src: |
      {{
        [
          "https://github.com/shotover/shotover-proxy/releases/download/",
          "v{{ shotover_version }}/shotover-proxy-linux_{{ shotover_arch }}",
          "-{{ shotover_version }}.tar.gz",
        ] | join('')
      }}
    dest: "{{ shotover_version_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
    creates: "{{ shotover_version_dir }}/shotover-proxy"
- name: Create Shotover symlink
  ansible.builtin.file:
    src: "{{ shotover_version_dir }}/shotover-proxy"
    dest: "{{ shotover_bin_path }}/shotover-proxy"
    state: link
- name: Create Shotover config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ shotover_user }}"
    group: "{{ shotover_group }}"
    mode: '0750'
  loop:
    - "{{ shotover_config_dir }}"
    - "{{ shotover_topology_dir }}"
- name: Deploy Shotover config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ shotover_config_dir }}/config.yaml"
    owner: "{{ shotover_user }}"
    group: "{{ shotover_group }}"
    mode: '0640'
  notify: Restart Shotover
- name: Deploy Shotover topology
  ansible.builtin.template:
    src: topology.yaml.j2
    dest: "{{ shotover_config_dir }}/topology.yaml"
    owner: "{{ shotover_user }}"
    group: "{{ shotover_group }}"
    mode: '0640'
  validate: "{{ shotover_bin_path }}/shotover-proxy --check --config-file {{ shotover_config_dir }}/config.yaml --topology-file %s"
  notify: Restart Shotover
- name: Deploy Shotover systemd service
  ansible.builtin.template:
    src: shotover-proxy.service.j2
    dest: /etc/systemd/system/shotover-proxy.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart Shotover
- name: Deploy Certbot renewal hook for Shotover
  ansible.builtin.template:
    src: shotover-cert-deploy.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/shotover-proxy
    owner: root
    group: root
    mode: '0755'
  notify: Cert Deploy Hook
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Ensure Shotover is started and enabled
  ansible.builtin.service:
    name: shotover-proxy
    state: started
    enabled: true
