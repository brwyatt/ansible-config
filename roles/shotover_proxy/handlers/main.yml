---
- name: Cert Deploy Hook
  ansible.builtin.command:
    argv:
      - "/etc/letsencrypt/renewal-hooks/deploy/shotover-proxy"
  environment:
    RENEWED_LINEAGE: "/etc/letsencrypt/live/{{ inventory_hostname }}"
  changed_when: true
- name: Restart Shotover
  ansible.builtin.service:
    name: shotover-proxy
    state: restarted
