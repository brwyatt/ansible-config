---
authelia_version: "4.38.0"

authelia_config_path: "/etc/authelia"
authelia_config_file: "{{ authelia_config_path }}/configuration.yml"

authelia_host: "0.0.0.0"
authelia_port: 9091

authelia_log_level: "info"

authelia_session_name: "authelia_session"
authelia_session_expiration: "1h"
authelia_session_inactivity: "5m"
authelia_session_remember_me_duration: "1M"
