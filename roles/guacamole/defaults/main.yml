---
# Guacamole Version for downloads
guacamole_version: "1.6.0"

# Tomcat Version for downloads
guacamole_tomcat_version: "9.0.86"

# Package names
guacamole_runtime_packages:
  - mariadb-client
  - python3-pymysql
  - openjdk-17-jdk-headless
  - maven
  - git
  - libmariadb-java
  - libavcodec-dev
  - libavformat-dev
  - libavutil-dev
  - libswscale-dev
  - libpango1.0-dev
  - libpulse-dev
  - libssh2-1-dev
  - libvncserver-dev
  - libwebsockets-dev
  - libwebp-dev
  - libssl-dev
  - libvorbis-dev
  - libjpeg-turbo8-dev
  - libpng-dev
  - libtool-bin
  - libcairo2-dev
  - libossp-uuid-dev
  - build-essential
  - autoconf
  - automake
  - make
  - fonts-noto-color-emoji
  - fonts-liberation

# Paths
guacamole_home: /etc/guacamole
guacamole_extensions_path: "{{ guacamole_home }}/extensions"
guacamole_lib_path: "{{ guacamole_home }}/lib"
guacamole_install_root: "/opt/guacamole-{{ guacamole_version }}"
guacamole_tomcat_install_root: "/opt/apache-tomcat-{{ guacamole_tomcat_version }}"

# URLs (Guacamole Download mirrors)
guacamole_mirror: "https://archive.apache.org/dist/guacamole"
guacamole_server_url: "{{ guacamole_mirror }}/{{ guacamole_version }}/source/guacamole-server-{{ guacamole_version }}.tar.gz"
guacamole_war_url: "{{ guacamole_mirror }}/{{ guacamole_version }}/binary/guacamole-{{ guacamole_version }}.war"
guacamole_auth_ldap_url: "{{ guacamole_mirror }}/{{ guacamole_version }}/binary/guacamole-auth-ldap-{{ guacamole_version }}.tar.gz"
guacamole_auth_jdbc_mysql_url: "{{ guacamole_mirror }}/{{ guacamole_version }}/binary/guacamole-auth-jdbc-{{ guacamole_version }}.tar.gz"

# Tomcat Download URL
guacamole_tomcat_mirror: "https://archive.apache.org/dist/tomcat"
guacamole_tomcat_major_version: "{{ guacamole_tomcat_version.split('.')[0] }}"
guacamole_tomcat_download_url: "{{ guacamole_tomcat_mirror }}/tomcat-{{ guacamole_tomcat_major_version }}/v{{ guacamole_tomcat_version }}/bin/apache-tomcat-{{ guacamole_tomcat_version }}.tar.gz" # noqa: yaml[line-length]

# SHA256 Checksums (Look up correct values for version)
guacamole_server_checksum: "sha256:8bc45675da96d7b6f39728160181e3d4ff3c08f460f6d26de5805b642bf13f2b"
guacamole_war_checksum: "sha256:b41ceb1e2df010b54db563e0b00edb8d5fe9f073c6168462e4c978df0fc6e716"
guacamole_auth_ldap_checksum: "sha256:b07f27adc370324108527b6929f61d93880026d57c1033064bd1c55b881c7497"
guacamole_auth_jdbc_checksum: "sha256:97bc5fd3d67d25c0e98a475d1dfd308a037859f549fac47171c723b7a7039366"
guacamole_tomcat_checksum: >-
  sha512:e8a8000dbeba5ee266ec4bf77217574364ffd114c8b913816f2e7a5e4eab4d01d0be3f05c8fccefcb5c5d770308efe1983be80279b6ef6d122d6183288a8ee9c
