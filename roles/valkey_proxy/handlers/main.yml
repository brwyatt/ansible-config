---
- name: Cert Deploy Hook
  ansible.builtin.command:
    argv:
      - "/etc/letsencrypt/renewal-hooks/deploy/valkey-proxy"
  environment:
    RENEWED_LINEAGE: "/etc/letsencrypt/live/{{ inventory_hostname }}"
  changed_when: true
- name: Restart Valkey Proxy
  ansible.builtin.service:
    name: valkey-cluster-proxy
    state: restarted
