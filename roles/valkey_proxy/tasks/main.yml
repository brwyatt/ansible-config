---
- name: Install Valkey Cluster Proxy
  ansible.builtin.package:
    name: valkey-cluster-proxy
    state: present
- name: Create Valkey Proxy config directory
  ansible.builtin.file:
    path: /etc/valkey-proxy
    state: directory
    owner: valkey
    group: valkey
    mode: '0755'
- name: Create Valkey Proxy certs directory
  ansible.builtin.file:
    path: /etc/valkey-proxy/certs
    state: directory
    owner: valkey
    group: valkey
    mode: '0750'
- name: Deploy Certbot renewal hook for Valkey Proxy
  ansible.builtin.template:
    src: proxy-cert-deploy.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/valkey-proxy
    owner: root
    group: root
    mode: '0755'
  notify: Cert Deploy Hook
- name: Configure Valkey Cluster Proxy
  ansible.builtin.template:
    src: proxy.conf.j2
    dest: /etc/valkey-proxy/proxy.conf
    owner: valkey
    group: valkey
    mode: '0640'
  notify: Restart Valkey Proxy
- name: Ensure Valkey Proxy is started and enabled
  ansible.builtin.service:
    name: valkey-cluster-proxy
    state: started
    enabled: true
