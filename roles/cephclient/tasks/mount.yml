---
- name: Set safe path name
  ansible.builtin.set_fact:
    safe_path_name: "{{ item.mount_path[1:].replace('/', '-') }}"
- name: Set systemd unit name
  ansible.builtin.set_fact:
    systemd_mount_unit: "{{ safe_path_name }}.mount"
    systemd_automount_unit: "{{ safe_path_name }}.automount"
- name: Create Mount Dir
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    mode: "{{ item.mode | default('0755') }}"
  become: true
- name: Check systemd mount unit existence
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ systemd_mount_unit }}"
  register: systemd_unit_stat
- name: Create systemd mount unit
  ansible.builtin.template:
    src: systemd_mount.j2
    dest: "/etc/systemd/system/{{ systemd_mount_unit }}"
    mode: '0644'
  become: true
  register: mount_unit
- name: Create systemd automount unit
  ansible.builtin.template:
    src: systemd_automount.j2
    dest: "/etc/systemd/system/{{ systemd_automount_unit }}"
    mode: '0644'
  become: true
  when: item.automount | default(cephclient_automount)
- name: "Enable CephFS Automount {{ item.mount_path }}"
  ansible.builtin.service:
    name: "{{ systemd_automount_unit }}"
    state: started
    enabled: true
    daemon_reload: true
  become: true
  when: item.automount | default(cephclient_automount)
- name: "Reload CephFS Mount if changed {{ item.mount_path }}"
  ansible.builtin.service:
    name: "{{ systemd_mount_unit }}"
    state: restarted
    daemon_reload: true
  become: true
  when: mount_unit.changed and systemd_unit_stat.stat.exists
- name: "Mount CephFS Mount {{ item.mount_path }}"
  ansible.builtin.service:
    name: "{{ systemd_mount_unit }}"
    state: started
    enabled: true
    daemon_reload: true
  become: true
- name: Set systemd timer unit name
  ansible.builtin.set_fact:
    systemd_mount_timer_unit: "{{ safe_path_name }}-mount-watch.timer"
    systemd_mount_timer_service: "{{ safe_path_name }}-mount-watch.service"
  when: item.remount_timer | default(cephclient_remount_timer)
- name: Create systemd remount timer service
  ansible.builtin.template:
    src: systemd_mount_timer_service.j2
    dest: "/etc/systemd/system/{{ systemd_mount_timer_service }}"
    mode: '0644'
  become: true
  when: item.remount_timer | default(cephclient_remount_timer)
  notify: Reload systemd
- name: Create systemd remount timer
  ansible.builtin.template:
    src: systemd_mount_timer.j2
    dest: "/etc/systemd/system/{{ systemd_mount_timer_unit }}"
    mode: '0644'
  become: true
  when: item.remount_timer | default(cephclient_remount_timer)
  notify: Reload systemd

- name: "Enable CephFS Remount Timer {{ item.mount_path }}"
  ansible.builtin.service:
    name: "{{ systemd_mount_timer_unit }}"
    state: started
    enabled: true
    daemon_reload: true
  become: true
  when: item.remount_timer | default(cephclient_remount_timer)
