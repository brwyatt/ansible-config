---
# Guacamole Port
proxy_port: 8080

# LDAP Connection (FreeIPA)
guacamole_ldap_hostname: ipa.home.brwyatt.net
guacamole_ldap_port: 636
guacamole_ldap_encryption_method: ssl
guacamole_ldap_search_bind_dn: "uid=guacamole,cn=users,cn=accounts,dc=home,dc=brwyatt,dc=net"
guacamole_ldap_user_base_dn: "cn=users,cn=accounts,dc=home,dc=brwyatt,dc=net"
guacamole_ldap_group_base_dn: "cn=groups,cn=accounts,dc=home,dc=brwyatt,dc=net"

# MariaDB Connection
guacamole_mysql_hostname: mariadb.server.home.brwyatt.net
guacamole_mysql_port: 3306
guacamole_mysql_database: guacamole
guacamole_mysql_username: guacamole

reverseproxy_sites:
  - server_names: "{{ certbot_certs[0] }}"
    destination: "http://127.0.0.1:{{ proxy_port }}"
    server_directives:
      - |
        location /websocket-tunnel {
            proxy_pass http://127.0.0.1:{{ proxy_port }}/websocket-tunnel;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            access_log off;
        }

# Nginx Configuration for trusted proxies
# The IPs of guacamole-haproxy nodes go here
reverseproxy_trusted_proxies:
  - "172.17.30.82"
  - "172.17.30.107"
reverseproxy_nginx_after:
  - network-online.target
  - tomcat.service
