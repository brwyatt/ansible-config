---
cert:
  - guacamole.home.brwyatt.net
haproxy_certbot_certs:
  - "{{ cert[0] }}"
haproxy_options:
  - "forwardfor"
  - "http-server-close"
haproxy_resolvers:
  localdns:
    nameservers:
      dns1:
        host: "127.0.0.53"
        port: "53"
    options:
      - "accepted_payload_size 8192"
haproxy_frontends:
  stats:
    bind:
      port: 8404
    options:
      - "stats enable"
      - "stats uri /"
      - "stats refresh 5s"
  www-http:
    bind:
      port: 80
    options:
      - "http-request redirect scheme https code 301"
  www-https:
    bind:
      port: 443
      ssl_cert: "/etc/haproxy/certs/{{ cert[0] }}.pem"
    backend: "guacamole-backend"
    options:
      - "http-request set-header X-Forwarded-Proto https"
haproxy_backends:
  guacamole-backend:
    balance: "leastconn"
    options:
      - "cookie SERVER insert indirect nocache dynamic"
      - "dynamic-cookie-key {{ guacamole_haproxy_cookie_key }}"
      - "default-server check"
      - "server-template web 1-5 _https._tcp.guacamole.server.home.brwyatt.net resolvers localdns init-addr none"
keepalived_check_scripts:
  haproxy:
    type: haproxy
keepalived_instances:
  guacamole:
    virtual_ip: "172.17.30.209/24"
    auth_pass: "{{ keepalived_auth_pass }}"
    check_scripts:
      - haproxy
