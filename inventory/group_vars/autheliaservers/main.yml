---
authelia_repo_source: "brwyatt/authelia"
authelia_version: "4.39.19-RedisKeyPrefix-v2"
authelia_checksum: "sha256:b9bfc30eef01fa77faa39e7fa51da7add63ace5109cbb9071a96ff3bd4fc411b"

authelia_session_domain: "home.brwyatt.net"

authelia_notifier_type: "smtp"
authelia_notifier_smtp_host: "smtps.brwyatt.net"
authelia_notifier_smtp_port: 465
authelia_notifier_smtp_tls: true
authelia_notifier_smtp_username: "authelia@brwyatt.net"
authelia_notifier_smtp_sender: "authelia@brwyatt.net"
authelia_notifier_smtp_identifier: "authelia.home.brwyatt.net"

authelia_password_ss_enabled: true

authelia_oidc_enabled: true

authelia_oidc_authorization_policies:
  homebox_policy:
    default_policy: deny
    rules:
      - policy: two_factor
        subject: 'group:homeboxusers'
  homeassistant_policy:
    default_policy: deny
    rules:
      - policy: two_factor
        subject: 'group:homeassistantadmins'
      - policy: two_factor
        subject: 'group:homeassistantusers'
  jellyfin_policy:
    default_policy: deny
    rules:
      - policy: two_factor
        subject: 'group:jellyfin-admins'
      - policy: two_factor
        subject: 'group:jellyfin-users'
  proxmox_policy:
    default_policy: deny
    rules:
      - policy: deny
        subject: 'group:pve-automation'
      - policy: two_factor
        subject: 'group:pve-admins'
      - policy: two_factor
        subject: 'group:pve-users'

authelia_oidc_clients:
  homebox:
    client_name: HomeBox
    client_secret: "{{ authelia_oidc_homebox_hashed_secret }}"
    public: false
    authorization_policy: homebox_policy
    require_pkce: true
    pkce_challenge_method: 'S256'
    redirect_uris:
      - https://homebox.server.home.brwyatt.net/api/v1/users/login/oidc/callback
    scopes:
      - openid
      - groups
      - email
      - profile
    response_types:
      - 'code'
    grant_types:
      - 'authorization_code'
    token_endpoint_auth_method: 'client_secret_basic'
  homeassistant:
    client_name: 'Home Assistant'
    client_secret: "{{ authelia_oidc_homeassistant_hashed_secret }}"
    public: false
    authorization_policy: homeassistant_policy
    require_pkce: true
    pkce_challenge_method: 'S256'
    redirect_uris:
      - 'https://homeassistant.home.brwyatt.net/auth/oidc/callback'
      - 'https://homeassistant.iot.home.brwyatt.net/auth/oidc/callback'
    token_endpoint_auth_method: 'client_secret_post'
  jellyfin:
    client_name: 'Jellyfin'
    client_secret: "{{ authelia_oidc_jellyfin_hashed_secret }}"
    public: false
    authorization_policy: jellyfin_policy
    require_pkce: true
    pkce_challenge_method: 'S256'
    redirect_uris:
      - 'https://jellyfin.home.brwyatt.net/sso/OID/redirect/authelia'
      - 'https://jellyfin.server.home.brwyatt.net/sso/OID/redirect/authelia'
    scopes:
      - openid
      - groups
      - profile
    response_types:
      - 'code'
    grant_types:
      - 'authorization_code'
    access_token_signed_response_alg: "none"
    userinfo_signed_response_alg: "none"
    token_endpoint_auth_method: 'client_secret_post'
  proxmox:
    client_name: 'Proxmox'
    client_secret: "{{ authelia_oidc_proxmox_hashed_secret }}"
    public: false
    authorization_policy: 'proxmox_policy'
    require_pkce: true
    pkce_challenge_method: 'S256'
    redirect_uris:
      - 'https://proxmox.home.brwyatt.net'
    scopes:
      - 'openid'
      - 'profile'
      - 'email'
      - 'groups'
    response_types:
      - 'code'
    grant_types:
      - 'authorization_code'
    access_token_signed_response_alg: 'none'
    userinfo_signed_response_alg: 'none'
    token_endpoint_auth_method: 'client_secret_basic'

authelia_session_redis_host: "valkey.server.home.brwyatt.net"
authelia_session_redis_password: "{{ valkey_authelia_password }}"
authelia_session_redis_tls_enabled: true
authelia_session_redis_key_prefix: "{authelia-session}"

authelia_ldap_url: "ldaps://ipa.home.brwyatt.net"
authelia_ldap_base_dn: "dc=home,dc=brwyatt,dc=net"
authelia_ldap_user: "uid=authelia,cn=users,cn=accounts,{{ authelia_ldap_base_dn }}"

authelia_database_type: "mysql"
authelia_database_host: "mariadb.server.home.brwyatt.net"
authelia_database_name: "authelia"
authelia_database_user: "authelia"

authelia_access_control_rules:
  # Seedbox
  - domain: "seedbox.server.home.brwyatt.net"
    policy: "bypass" # Fall-through to application auth
    networks:
      - "172.17.20.20/32" # Home Assistant
      - "172.17.30.0/24" # Server Subnet
  - domain: "seedbox.server.home.brwyatt.net"
    policy: "two_factor"
    subject: "group:seedboxusers"
  # Sonarr
  - domain: "sonarr.server.home.brwyatt.net"
    policy: "two_factor"
    subject: "group:arrsusers"
  # Radarr
  - domain: "radarr.server.home.brwyatt.net"
    policy: "two_factor"
    subject: "group:arrsusers"
  # Prowlarr
  - domain: "prowlarr.server.home.brwyatt.net"
    policy: "two_factor"
    subject: "group:arrsusers"
  # Z-Wave JS UI
  - domain: "zwave-js-ui.iot.home.brwyatt.net"
    policy: "two_factor"
    subject: "group:iot-admins"
  # Zigbee2MQTT
  - domain: "zigbee2mqtt.iot.home.brwyatt.net"
    policy: "two_factor"
    subject: "group:iot-admins"

proxy_port: 9091

reverseproxy_recursive_proxies: true
reverseproxy_trusted_proxies:
  # HAProxy hosts
  - "172.17.30.121"
  - "172.17.30.172"
  # Inbound Proxy Hosts
  - "172.17.30.111"
  - "172.17.30.197"
